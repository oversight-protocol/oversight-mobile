name: iOS — TestFlight

# Builds the iOS app on Apple Silicon macOS runners and uploads to TestFlight.
# No local Mac required; everything runs on GitHub-hosted macos-14.
#
# Triggers:
#   * push to main → build only (sanity check, no upload)
#   * tag v*       → build + upload to TestFlight
#   * manual       → workflow_dispatch
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       Key ID from App Store Connect → Users and Access → Integrations → Keys
#   APP_STORE_CONNECT_API_ISSUER_ID    Issuer ID from the same page (top of the page, UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64   base64 of the .p8 file you downloaded when creating the key
#   APPLE_TEAM_ID                      10-character team ID from developer.apple.com → Membership

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  RUST_VERSION: stable
  BUNDLE_ID: com.oversightprotocol.oversight

jobs:
  build:
    name: Build IPA + (optionally) upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules for oversight-rust)
        uses: actions/checkout@v4

      # The Rust core lives in a sibling repo. Clone it at a pinned commit so
      # builds are reproducible — bumping is an explicit PR.
      - name: Fetch Oversight protocol crates
        run: |
          git clone --depth 1 https://github.com/oversight-protocol/oversight.git ../oversight-gh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust + iOS targets
        run: |
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cocoapods cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # PowerShell adds UTF-8 BOM (3 bytes) when piping strings into gh
          # secret set, so strip everything that isn't printable ASCII.
          KEY_ID=$(printf %s "$API_KEY_ID_RAW" | tr -cd '[:print:]')
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          ls -la ~/.appstoreconnect/private_keys/

      - name: Build unsigned archive (sanity check on every push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          flutter build ios --release --no-codesign

      - name: Setup Ruby + Fastlane
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Build + sign + upload via Fastlane (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FASTLANE_HIDE_CHANGELOG: "1"
          FASTLANE_DISABLE_COLORS: "1"
        run: |
          set -euo pipefail
          # Diagnostics — verify secrets aren't carrying CRLF from PowerShell push
          echo "API_KEY_ID len:    $(printf %s "$API_KEY_ID"    | wc -c) (want 10)"
          echo "API_ISSUER_ID len: $(printf %s "$API_ISSUER_ID" | wc -c) (want 36)"
          echo "TEAM_ID len:       $(printf %s "$TEAM_ID"       | wc -c) (want 10)"
          # PowerShell pushes secrets with a UTF-8 BOM prefix; keep only
          # printable ASCII so the .p8 path resolves and JWT claims are clean.
          API_KEY_ID=$(printf %s "$API_KEY_ID" | tr -cd '[:print:]')
          API_ISSUER_ID=$(printf %s "$API_ISSUER_ID" | tr -cd '[:print:]')
          TEAM_ID=$(printf %s "$TEAM_ID" | tr -cd '[:print:]')
          echo "After strip: KEY_ID=$(printf %s "$API_KEY_ID" | wc -c)  ISSUER_ID=$(printf %s "$API_ISSUER_ID" | wc -c)  TEAM_ID=$(printf %s "$TEAM_ID" | wc -c)"
          export API_KEY_ID API_ISSUER_ID TEAM_ID
          export API_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          ls -la ~/.appstoreconnect/private_keys/ || true
          [ -f "$API_KEY_PATH" ] && echo "p8 exists at expected path" || echo "p8 MISSING at $API_KEY_PATH"

          # Flutter assembles the .app first; Fastlane gym handles archive + sign + export
          flutter build ios --release --no-codesign

          # Fastlane appstore lane: cert + sigh + gym + pilot
          # cert/sigh use ASC API v1 endpoints which actually work with the API key,
          # bypassing xcodebuild's flaky DVTPortal auth.
          cd ios
          bundle exec fastlane appstore

      - name: Upload IPA artifact (for manual download / inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 14
