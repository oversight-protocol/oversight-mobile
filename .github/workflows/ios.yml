name: iOS — TestFlight

# Builds the iOS app on Apple Silicon macOS runners and uploads to TestFlight.
# No local Mac required; everything runs on GitHub-hosted macos-14.
#
# Triggers:
#   * push to main → build only (sanity check, no upload)
#   * tag v*       → build + upload to TestFlight
#   * manual       → workflow_dispatch
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       Key ID from App Store Connect → Users and Access → Integrations → Keys
#   APP_STORE_CONNECT_API_ISSUER_ID    Issuer ID from the same page (top of the page, UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64   base64 of the .p8 file you downloaded when creating the key
#   APPLE_TEAM_ID                      10-character team ID from developer.apple.com → Membership
#   BUILD_CERTIFICATE_BASE64           base64 of the iOS Distribution .p12 (cert + private key)
#   P12_PASSWORD                       passphrase for the .p12
#   BUILD_PROVISION_PROFILE_BASE64     base64 of the App Store .mobileprovision matching com.oversightprotocol.oversight

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  RUST_VERSION: stable
  BUNDLE_ID: com.oversightprotocol.oversight

jobs:
  build:
    name: Build IPA + (optionally) upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules for oversight-rust)
        uses: actions/checkout@v4

      # The Rust core lives in a sibling repo. Clone it at a pinned commit so
      # builds are reproducible — bumping is an explicit PR.
      - name: Fetch Oversight protocol crates
        run: |
          git clone --depth 1 https://github.com/oversight-protocol/oversight.git ../oversight-gh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust + iOS targets
        run: |
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cocoapods cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # PowerShell adds UTF-8 BOM (3 bytes) when piping strings into gh
          # secret set, so strip everything that isn't printable ASCII.
          KEY_ID=$(printf %s "$API_KEY_ID_RAW" | tr -cd '[:print:]')
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          ls -la ~/.appstoreconnect/private_keys/

      - name: Build unsigned archive (sanity check on every push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          flutter build ios --release --no-codesign

      - name: Import iOS Distribution code-signing cert
        if: startsWith(github.ref, 'refs/tags/v')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install App Store provisioning profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 -d > "$PROFILE_DIR/Oversight_Protocol_AppStore.mobileprovision"
          # Sanity log — extract UUID + Name from the embedded plist
          /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<<"$(/usr/bin/security cms -D -i "$PROFILE_DIR/Oversight_Protocol_AppStore.mobileprovision")"
          /usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<<"$(/usr/bin/security cms -D -i "$PROFILE_DIR/Oversight_Protocol_AppStore.mobileprovision")"
          ls -la "$PROFILE_DIR"

      - name: Build signed IPA + upload to TestFlight (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # PowerShell-pushed secrets carry a UTF-8 BOM that broke prior
          # xcodebuild auth (401 on listTeams) by polluting JWT kid claims.
          # Strip to printable ASCII before use.
          API_KEY_ID=$(printf %s "$API_KEY_ID" | tr -cd '[:print:]')
          API_ISSUER_ID=$(printf %s "$API_ISSUER_ID" | tr -cd '[:print:]')
          TEAM_ID=$(printf %s "$TEAM_ID" | tr -cd '[:print:]')
          export API_KEY_ID API_ISSUER_ID TEAM_ID
          export API_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Inject team ID into the committed ExportOptions.plist
          /usr/bin/sed -i "" "s/__TEAM_ID__/${TEAM_ID}/g" ios/ExportOptions.plist

          # Flutter assembles the .app; xcodebuild signs + exports + uploads
          flutter build ios --release --no-codesign

          cd ios
          # Manual signing: cert is in the runner keychain (apple-actions/import-codesign-certs),
          # profile is in ~/Library/MobileDevice/Provisioning Profiles. Pods retain their
          # per-target Development settings via the Podfile post_install hook
          # (CODE_SIGNING_ALLOWED=NO).
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=iOS Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Oversight Protocol AppStore"

          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

          IPA_PATH=$(find build/ipa -name '*.ipa' | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA artifact (for manual download / inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 14
