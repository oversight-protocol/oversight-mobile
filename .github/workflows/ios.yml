name: iOS — TestFlight

# Builds the iOS app on Apple Silicon macOS runners and uploads to TestFlight.
# No local Mac required; everything runs on GitHub-hosted macos-14.
#
# Triggers:
#   * push to main → build only (sanity check, no upload)
#   * tag v*       → build + upload to TestFlight
#   * manual       → workflow_dispatch
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       Key ID from App Store Connect → Users and Access → Integrations → Keys
#   APP_STORE_CONNECT_API_ISSUER_ID    Issuer ID from the same page (top of the page, UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64   base64 of the .p8 file you downloaded when creating the key
#   APPLE_TEAM_ID                      10-character team ID from developer.apple.com → Membership

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  RUST_VERSION: stable
  BUNDLE_ID: com.oversightprotocol.oversight

jobs:
  build:
    name: Build IPA + (optionally) upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules for oversight-rust)
        uses: actions/checkout@v4

      # The Rust core lives in a sibling repo. Clone it at a pinned commit so
      # builds are reproducible — bumping is an explicit PR.
      - name: Fetch Oversight protocol crates
        run: |
          git clone --depth 1 https://github.com/oversight-protocol/oversight.git ../oversight-gh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust + iOS targets
        run: |
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cocoapods cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build unsigned archive (sanity check on every push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          flutter build ios --release --no-codesign

      - name: Build signed IPA + upload to TestFlight (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Render ExportOptions.plist with team ID injected
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>upload</string>
          </dict>
          </plist>
          EOF

          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

          # Find the produced .ipa and upload via App Store Connect API
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA artifact (for manual download / inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 14
