name: iOS — TestFlight

# Builds the iOS app on Apple Silicon macOS runners and uploads to TestFlight.
# No local Mac required; everything runs on GitHub-hosted macos-14.
#
# Triggers:
#   * push to main → build only (sanity check, no upload)
#   * tag v*       → build + upload to TestFlight
#   * manual       → workflow_dispatch
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID       Key ID from App Store Connect → Users and Access → Integrations → Keys
#   APP_STORE_CONNECT_API_ISSUER_ID    Issuer ID from the same page (top of the page, UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64   base64 of the .p8 file you downloaded when creating the key
#   APPLE_TEAM_ID                      10-character team ID from developer.apple.com → Membership

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  RUST_VERSION: stable
  BUNDLE_ID: com.oversightprotocol.oversight

jobs:
  build:
    name: Build IPA + (optionally) upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules for oversight-rust)
        uses: actions/checkout@v4

      # The Rust core lives in a sibling repo. Clone it at a pinned commit so
      # builds are reproducible — bumping is an explicit PR.
      - name: Fetch Oversight protocol crates
        run: |
          git clone --depth 1 https://github.com/oversight-protocol/oversight.git ../oversight-gh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust + iOS targets
        run: |
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Cocoapods cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build unsigned archive (sanity check on every push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          flutter build ios --release --no-codesign

      - name: Build signed IPA + upload to TestFlight (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          API_KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Inject team ID into the committed ExportOptions.plist
          /usr/bin/sed -i "" "s/__TEAM_ID__/${TEAM_ID}/g" ios/ExportOptions.plist

          # Build .app without signing (Flutter assembles, xcodebuild signs)
          flutter build ios --release --no-codesign

          # Archive with automatic signing via App Store Connect API key.
          # -allowProvisioningUpdates lets xcodebuild create the distribution
          # cert + provisioning profile on demand using the API key — no Mac,
          # no manual cert management, no fastlane match repo needed.
          cd ios
          # Note: do NOT pass CODE_SIGN_IDENTITY here — it cascades to Pod
          # targets which only sign for Development. xcodebuild's automatic
          # signing picks Distribution for the Runner archive scheme on its
          # own, while Pods retain their per-target development signing.
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

          # Export signed IPA from the archive
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

          IPA_PATH=$(find build/ipa -name '*.ipa' | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA artifact (for manual download / inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 14
