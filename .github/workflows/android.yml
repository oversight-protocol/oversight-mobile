name: Android — APK + AAB

# Builds Android artifacts on every push and on tags. No external infra needed
# — Android tooling is all Linux-friendly so this runs on the standard
# ubuntu-latest runner.
#
# For Play Store upload we use a signed AAB. Required secrets when shipping:
#   ANDROID_KEYSTORE_BASE64   base64 of your upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  RUST_VERSION: stable
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK (debug) + AAB (release on tags)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Oversight protocol crates
        run: git clone --depth 1 https://github.com/oversight-protocol/oversight.git ../oversight-gh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust + Android targets
        run: |
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - run: flutter pub get

      - name: Build debug APK (sanity)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: flutter build apk --debug --target-platform android-arm64

      - name: Decode signing keystore (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/upload-keystore.jks

      - name: Build release AAB (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore/upload-keystore.jks
          EOF
          flutter build appbundle --release

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          if-no-files-found: ignore
          retention-days: 14
